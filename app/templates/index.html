{% extends "base.html" %}

{% block title %}首页 - 极简博客{% endblock %}

{% block content %}
<h1>文章列表</h1>

{% if posts %}
    <ul style="list-style:none;padding:0;">
        {% for post in posts %}
        <li style="margin-bottom:20px;padding-bottom:20px;
                   border-bottom:1px solid #eee;">
            <h2 style="margin:0 0 5px 0;">
                <a href="{{ url_for('posts.detail', post_id=post.id) }}">
                    {{ post.title }}
                </a>
            </h2>
            <small>{{ post.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
        </li>
        {% endfor %}
    </ul>
{% else %}
    <p>还没有文章，快来写一篇吧！</p>
{% endif %}
{% endblock %}
